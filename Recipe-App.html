<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe-App</title>
    <link rel="stylesheet" href="Recipe-App.css" />
  </head>
  <body>
    <header>
      <nav>
        <h2>Recipe App</h2>
        <form class="search-form">
          <input
            type="text"
            placeholder="Let's cook something yummy!"
            class="search-box"
          />
          <button class="search-btn" type="submit">Discover</button>
        </form>
      </nav>
    </header>
    <main>
      <section>
        <div class="recipe-container">
          <h2>Discover your favourite recipes</h2>
        </div>
      </section>
    </main>
    <script src="Recipe-App.js"></script>
  </body>
</html>
